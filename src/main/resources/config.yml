# ================================
#        sCoins - Configuração
# ================================

# ================================
#         Banco de Dados
# storage-type: "yaml" (padrão, sem necessidade de MySQL)
#               "mysql" (recomendado para servidores com 50+ jogadores)
# ================================
storage-type: "yaml"

database:
  host: "localhost"
  port: 3306
  name: "scoins"
  username: "root"
  password: ""
  # Prefixo das tabelas (útil se o banco é compartilhado com outros plugins)
  table-prefix: "scoins_"
  # Pool de conexões HikariCP
  pool-size: 10
  connection-timeout: 30000
  idle-timeout: 600000
  max-lifetime: 1800000

# Coins que o jogador recebe ao entrar pela primeira vez
starting-coins: 0

# Limite máximo de coins que um jogador pode ter
max-coins: 2000000000

# Valor mínimo para transferência entre jogadores
min-transfer: 1

# Cooldown entre envios de coins (em segundos, 0 = desativado)
transfer-cooldown: 30

# ================================
#       Recompensa por Tempo Online
# ================================

# Ativar ou desativar o sistema de recompensa
reward-enabled: true

# A cada quantos minutos o jogador recebe coins
reward-interval: 5

# Quantos coins o jogador recebe por intervalo
reward-amount: 10

# ================================
#         Histórico de Transações
# ================================

# Máximo de transações salvas por jogador
history-max-entries: 10

# ================================
#     Auto-Save (segurança contra crashes)
# ================================

# Intervalo em minutos para salvar automaticamente os dados de todos os jogadores
auto-save-interval: 5

# ================================
#         Sons
# Use "none" para desativar um som específico
# Volume: 0.0 a 1.0  |  Pitch: 0.5 (grave) a 2.0 (agudo)
# Lista de sons: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Sound.html
# ================================
sounds:

  # Abrir qualquer menu
  menu-open:
    sound: BLOCK_ENDER_CHEST_OPEN
    volume: 0.5
    pitch: 1.3

  # Clicar em um item de navegação (botão voltar, ir para histórico, etc.)
  menu-click:
    sound: UI_BUTTON_CLICK
    volume: 0.6
    pitch: 1.0

  # Fechar / voltar no menu
  menu-back:
    sound: BLOCK_CHEST_CLOSE
    volume: 0.4
    pitch: 1.2

  # Ativar recebimento de coins
  toggle-on:
    sound: BLOCK_NOTE_BLOCK_PLING
    volume: 0.7
    pitch: 1.8

  # Desativar recebimento de coins
  toggle-off:
    sound: BLOCK_NOTE_BLOCK_BASS
    volume: 0.7
    pitch: 0.8

  # Enviar coins com sucesso (quem enviou)
  transfer-send:
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 0.8
    pitch: 1.4

  # Receber coins de outro jogador
  transfer-receive:
    sound: ENTITY_PLAYER_LEVELUP
    volume: 0.5
    pitch: 1.6

  # Erro em qualquer operação (sem saldo, cooldown, etc.)
  error:
    sound: ENTITY_VILLAGER_NO
    volume: 0.8
    pitch: 1.0

  # Admin adicionou coins a um jogador (quem recebeu)
  coins-add:
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 1.0
    pitch: 1.2

  # Admin removeu coins de um jogador (quem perdeu)
  coins-remove:
    sound: BLOCK_ANVIL_USE
    volume: 0.5
    pitch: 1.5

  # Recompensa por tempo online
  reward:
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 0.7
    pitch: 1.5

  # Novo magnata anunciado
  magnata:
    sound: UI_TOAST_CHALLENGE_COMPLETE
    volume: 1.0
    pitch: 1.0

# ================================
#         Formatação de Coins
# Use /coins formatar <valor> <sufixo> para adicionar em tempo real
# Use /coins formatar <valor> remover para remover
# ================================
formatting:
  "1000": "K"
  "1000000": "M"
  "1000000000": "B"

# ================================
#         Rank — Top 3
# Prefixos exibidos no Tab e no Chat para os top 3 jogadores
# ================================
rank:
  # Prefixo no Tab (lista de jogadores)
  tab-prefix-1: "&6&l[🥇]"
  tab-prefix-2: "&7&l[🥈]"
  tab-prefix-3: "&e&l[🥉]"

  # Prefixo no Chat (antes do nome)
  chat-prefix-1: "&6&l[🥇]"
  chat-prefix-2: "&7&l[🥈]"
  chat-prefix-3: "&e&l[🥉]"

# ================================
#           Mensagens
# Use & para cores  |  \n para pular linha
# ================================
messages:
  # Geral
  only-players: "&c&lCOINS &cApenas jogadores podem usar este comando."
  no-permission: "&c&lCOINS &cVocê não tem permissão para usar este comando."
  player-not-found: "&c&lCOINS &cJogador não encontrado ou offline."
  invalid-number: "&c&lCOINS &cDigite um número válido."
  invalid-amount: "&c&lCOINS &cO valor deve ser maior que zero."
  never-joined: "&c&lCOINS &cEsse jogador nunca entrou no servidor."

  # /coins (ver saldo próprio)
  balance-self: "&6&lCOINS &eSeu saldo: &2⛃&a{coins} &ecoins."

  # /coins <jogador>
  balance-other-online: "&6&lCOINS &eSaldo de &a{player} &8→ &2⛃&a{coins} &ecoins."
  balance-other-offline: "&6&lCOINS &eSaldo de &a{player} &7(offline) &8→ &2⛃&a{coins} &ecoins."

  # /coins add
  add-success-sender: "&6&lCOINS &eAdicionado &2⛃&a{coins}&e coins para &a{player}&e."
  add-success-target: "&6&lCOINS &eVocê recebeu &2⛃&a{coins}&e coins."
  add-max-reached: "&c&lCOINS &c{player} já atingiu o limite máximo de coins &2⛃&a{max}&c."

  # /coins remove
  remove-success-sender: "&6&lCOINS &eRemovido &2⛃&a{coins}&e coins de &a{player}&e."
  remove-success-target: "&c&lCOINS &cFoi removido &2⛃&a{coins}&c coins da sua conta."
  remove-no-balance: "&c&lCOINS &cEsse jogador não possui coins suficientes."

  # /coins setar
  set-success-sender: "&6&lCOINS &eSaldo de &a{player}&e definido para &2⛃&a{coins}&e coins."
  set-success-target: "&6&lCOINS &eSeu saldo foi definido para &2⛃&a{coins}&e coins."

  # /coins enviar
  transfer-only-players: "&c&lCOINS &cApenas jogadores podem enviar coins."
  transfer-self: "&c&lCOINS &cVocê não pode enviar coins para si mesmo."
  transfer-min: "&c&lCOINS &cO valor mínimo de transferência é &e{min} coins&c."
  transfer-target-max: "&c&lCOINS &c{player} atingiria o limite máximo de coins ao receber essa quantia."
  transfer-no-balance: "&c&lCOINS &cVocê não possui coins suficientes."
  transfer-cooldown: "&c&lCOINS &cAguarde &e{time}s&c antes de enviar coins novamente."
  transfer-success-sender: "&6&lCOINS &eVocê enviou &2⛃&a{coins}&e coins para &a{player}&e."
  transfer-success-target: "&6&lCOINS &eVocê recebeu &2⛃&a{coins}&e coins de &e{player}&e."
  transfer-blocked-toggle: "&c&lCOINS &c{player} não está aceitando coins no momento."

  # /coins toggle
  toggle-on: "&6&lCOINS &aVocê ativou o recebimento de coins."
  toggle-off: "&6&lCOINS &cVocê desativou o recebimento de coins."

  # /coins formatar
  formatar-usage: "\n &6&lCOINS &8— &eFormatação de Coins\n\n  &7Comandos:\n   &6/coins formatar &8— &eListar todos os formatos ativos\n   &6/coins formatar <número> <sufixo> &8— &eAdicionar um novo formato\n   &6/coins formatar <número> remover &8— &eRemover um formato\n"
  formatar-success: "&6&lCOINS &aFormato adicionado: &e{valor} &a→ &e{sufixo}&a."
  formatar-removed: "&6&lCOINS &eFormato para &a{valor}&e removido com sucesso."
  formatar-not-found: "&c&lCOINS &cNenhum formato encontrado para &e{valor}&c."
  formatar-invalid-value: "&c&lCOINS &cValor inválido. Use apenas números inteiros positivos."
  formatar-list-header: "&7&7&7Formatos configurados:"
  formatar-list-entry: "   &7• &e{valor} &7→ &a{sufixo}"
  formatar-list-empty: " &c&lCOINS &cNenhum formato definido."

  # Ajuda
  help: "\n&6&lCOINS\n\n &6/coins &7— &eVer o seu saldo\n &6/coins <jogador> &7— &eVer o saldo de outro jogador\n &6/coins enviar <jogador> <valor> &7— &eEnviar coins\n &6/coins extrato &7— &eVer seu extrato de transações\n &6/coins top &7— &eVer o ranking de coins\n &6/coins toggle &7— &eAtivar/desativar recebimento de coins\n &6/coins add <jogador> <valor> &7— &eAdicionar coins &7[admin]\n &6/coins remove <jogador> <valor> &7— &eRemover coins &7[admin]\n &6/coins setar <jogador> <valor> &7— &eDefinir saldo exato &7[admin]\n &6/coins formatar <valor> <sufixo> &7— &eDefinir formatação &7[admin]\n &6/coins reload &7— &eRecarregar o config.yml &7[admin]\n &6/coins db status &7— &eVer status do banco de dados &7[admin]\n &6/coins npc set <1|2|3> &7— &ePositionar NPC do top &7[admin]\n &6/coins npc remove <1|2|3> &7— &eRemover NPC do top &7[admin]\n &6/coins npc reload &7— &eAtualizar skins e holograms &7[admin]\n&7"

  # Recompensa por tempo online
  reward-chat: "&6&lCOINS &eVocê ganhou &2⛃&a{coins}&e coins por jogar!"
  reward-actionbar: "&6&lCOINS &eVocê recebeu &2⛃&a{coins} &ecoins por &a{tempo} &eonline!"
  reward-max-reached: "&6&lCOINS &eVocê atingiu o limite máximo de coins &2⛃&a{max}&e!"

  # Novo Magnata — broadcast no chat para todos
  magnata-broadcast: "\n &a&lNOVO MAGNATA\n\n  &eO jogador &a{player} &eé o novo &a&lMAGNATA &edo servidor! \n  &eO novo magnata possui &8→ &a⛃{coins} &ecoins\n "

  # Tag exibida pelo placeholder %yeconomy_magnata% e pela tag {magnata} no chat
  # Aparece apenas para o jogador que for o magnata atual
magnata-tag: "&6&l[MAGNATA]"

  # Title e Subtitle exibidos na tela de todos ao surgir novo magnata
  # {player} e {coins} disponíveis em ambos
  magnata-title: "&a{player}"
  magnata-subtitle: "&eé o novo magnata!"

  # Tempo do title em ticks (20 ticks = 1 segundo)
  magnata-title-fadein: 10
  magnata-title-stay: 80
  magnata-title-fadeout: 20
